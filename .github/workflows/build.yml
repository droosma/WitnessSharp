name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet restore WitnessSharp.slnx
      - run: dotnet build WitnessSharp.slnx --no-restore -c Release
      - run: dotnet test WitnessSharp.slnx --no-build -c Release --logger "trx;LogFileName=results.trx"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore

  pack:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet pack WitnessSharp.slnx -c Release -o ./artifacts
      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  aot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet publish samples/SampleWebApi/SampleWebApi.csproj -c Release -r linux-x64 /p:PublishAot=true

  mutation-testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore tools
        run: dotnet tool restore
      - name: Run Stryker
        run: dotnet stryker --config-file stryker-config.json
      - name: Upload Stryker report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: stryker-report
          path: StrykerOutput/
      - name: Publish mutation score badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          REPORT=$(find StrykerOutput -name "mutation-report.json" | head -1)
          SCORE=$(python3 -c "
          import json, sys
          with open('$REPORT') as f:
              data = json.load(f)
          files = data.get('files', {})
          total_detected = sum(1 for f in files.values() for m in f.get('mutants', []) if m['status'] in ('Killed', 'Timeout'))
          total_mutants = sum(1 for f in files.values() for m in f.get('mutants', []) if m['status'] not in ('Ignored', 'CompileError'))
          score = (total_detected / total_mutants * 100) if total_mutants > 0 else 100
          print(f'{score:.1f}')
          ")
          echo "Mutation score: ${SCORE}%"

          COLOR="red"
          if (( $(echo "$SCORE >= 100" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$SCORE >= 80" | bc -l) )); then COLOR="green"
          elif (( $(echo "$SCORE >= 60" | bc -l) )); then COLOR="yellow"
          fi

          mkdir -p /tmp/badge
          printf '{"schemaVersion":1,"label":"mutation score","message":"%s%%","color":"%s"}' "$SCORE" "$COLOR" > /tmp/badge/mutation.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null && git checkout -B badges origin/badges || { git checkout --orphan badges; git rm -rf . 2>/dev/null || true; }

          mkdir -p .badges
          cp /tmp/badge/mutation.json .badges/mutation.json
          git add .badges/mutation.json
          git diff --cached --quiet || git commit -m "Update mutation score badge: ${SCORE}%"
          git push origin badges --force
