name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore WitnessSharp.slnx
      - run: dotnet build WitnessSharp.slnx --no-restore -c Release
      - run: dotnet test WitnessSharp.slnx --no-build -c Release --logger "trx;LogFileName=results.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore

  pack:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full history
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet pack WitnessSharp.slnx -c Release -o ./artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  aot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet publish samples/SampleWebApi/SampleWebApi.csproj -c Release -r linux-x64 /p:PublishAot=true
        # Treat AOT warnings from OUR code as errors; upstream OTel warnings documented but allowed
